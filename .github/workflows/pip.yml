name: CI (uv)

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    name: Build with uv
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    # 1. 安裝 uv
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true # 自動快取依賴，下次跑更快

    # 2. 設置 Python (uv 會自動管理 Python 版本)
    - name: Set up Python
      run: uv python install ${{ matrix.python-version }}

    - name: Set min macOS version
      if: runner.os == 'macOS'
      run: |
        echo "MACOSX_DEPLOYMENT_TARGET=10.14" >> $GITHUB_ENV

    # 3. 安裝項目與依賴 (uv sync 或 uv pip install)
    - name: Install dependencies
      run: |
        uv sync --all-groups

    # 4. 運行測試 (移除 cd tests，直接在根目錄執行)
    - name: Test
      run: uv run pytest